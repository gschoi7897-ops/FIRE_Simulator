<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>저축 시뮬레이터</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f6f8;
      --surface: #ffffff;
      --border: #e2e5ea;
      --text: #1a1d23;
      --text-secondary: #5c6370;
      --accent: #2563eb;
      --accent-light: #eff6ff;
      --interest: #059669;
      --interest-light: #ecfdf5;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }

    .container {
      max-width: 880px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }

    header {
      margin-bottom: 28px;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    header p {
      font-size: 0.875rem;
      color: var(--text-secondary);
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .panel-title {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-secondary);
      margin-bottom: 14px;
    }

    .inputs {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    @media (max-width: 640px) {
      .inputs { grid-template-columns: minmax(0, 1fr); }
    }

    .field {
      min-width: 0;
    }

    .field label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 500;
      margin-bottom: 6px;
    }

    .field .input-wrap {
      display: flex;
      align-items: center;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      background: var(--bg);
    }

    .field input {
      flex: 1;
      border: none;
      background: transparent;
      padding: 9px 12px;
      font-size: 1rem;
      font-family: inherit;
      color: var(--text);
      min-width: 0;
    }

    .field input:focus {
      outline: none;
    }

    .field input[type="date"] {
      color-scheme: light;
    }

    .birth-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .birth-row .input-wrap {
      flex: 1;
    }

    .save-btn {
      flex-shrink: 0;
      padding: 9px 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.8125rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }

    .save-btn:hover { background: #1d4ed8; }
    .save-btn:active { background: #1e40af; }
    .save-btn.saved { background: var(--interest); }

    .field .input-wrap:focus-within {
      border-color: var(--accent);
      background: var(--surface);
    }

    .field .unit {
      flex-shrink: 0;
      padding: 0 10px;
      font-size: 0.8125rem;
      color: var(--text-secondary);
      white-space: nowrap;
      border-left: 1px solid var(--border);
      background: var(--surface);
    }

    .field-hint {
      margin-top: 5px;
      font-size: 0.75rem;
      color: var(--accent);
      min-height: 1.125rem;
      word-break: keep-all;
    }

    .field-hint:empty {
      display: none;
    }

    .notice {
      margin-top: 12px;
      font-size: 0.8125rem;
      color: #b45309;
      display: none;
    }

    .notice.visible { display: block; }

    .results {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 20px;
    }

    @media (max-width: 640px) {
      .results { grid-template-columns: 1fr; }
    }

    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 16px;
    }

    .result-card.highlight {
      border-color: var(--accent);
      background: var(--accent-light);
    }

    .result-card .period {
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    .result-card.highlight .period {
      color: var(--accent);
    }

    .result-card .amount {
      font-size: 1.375rem;
      font-weight: 700;
      margin-bottom: 10px;
      word-break: break-all;
    }

    .result-card .meta {
      font-size: 0.75rem;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    .result-card .meta .interest {
      color: var(--interest);
      font-weight: 500;
    }

    .result-card.inactive {
      opacity: 0.55;
      border-style: dashed;
    }

    .result-card.positive {
      border-color: var(--interest);
      background: var(--interest-light);
    }

    .result-card.positive .period {
      color: var(--interest);
    }

    .result-card .amount-muted {
      font-size: 0.875rem;
      font-weight: 400;
      color: var(--text-secondary);
      margin-bottom: 10px;
      line-height: 1.5;
    }

    .chart-wrap {
      position: relative;
      margin-bottom: 8px;
    }

    canvas {
      display: block;
      width: 100%;
      height: 260px;
    }

    .chart-caption {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8125rem;
    }

    thead th {
      text-align: left;
      padding: 10px 12px;
      font-weight: 600;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--border);
      font-size: 0.75rem;
    }

    thead th:not(:first-child) {
      text-align: right;
    }

    tbody td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
    }

    tbody td:not(:first-child) {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    tbody tr:hover {
      background: var(--bg);
    }

    tbody td.interest-cell {
      color: var(--interest);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>저축 시뮬레이터</h1>
      <p>매월 말 납입 · 저축 기간 이후 납입 중단 · 저축 종료 시 퇴직금 일시 반영 · 퇴직 후 매월 생활비 차감 · 월복리 가정 · 세금·인플레 미반영</p>
    </header>

    <section class="panel">
      <div class="panel-title">입력</div>
      <div class="inputs">
        <div class="field">
          <label for="monthly">월 저축액</label>
          <div class="input-wrap">
            <input type="number" id="monthly" value="50" min="0" step="10">
            <span class="unit">만원</span>
          </div>
        </div>
        <div class="field">
          <label for="contributionYears">저축 기간</label>
          <div class="input-wrap">
            <input type="number" id="contributionYears" value="10" min="0" max="10" step="1">
            <span class="unit">년</span>
          </div>
        </div>
        <div class="field">
          <label for="initial">초기 자산</label>
          <div class="input-wrap">
            <input type="number" id="initial" value="0" min="0" step="1000">
            <span class="unit">만원</span>
          </div>
          <p class="field-hint" id="initial-hint" aria-live="polite"></p>
        </div>
        <div class="field">
          <label for="rate">연 수익률</label>
          <div class="input-wrap">
            <input type="number" id="rate" value="7" min="0" max="100" step="1">
            <span class="unit">%</span>
          </div>
        </div>
        <div class="field">
          <label for="severance">퇴직금</label>
          <div class="input-wrap">
            <input type="number" id="severance" value="0" min="0" step="1000">
            <span class="unit">만원</span>
          </div>
          <p class="field-hint" id="severance-hint" aria-live="polite"></p>
        </div>
        <div class="field">
          <label for="livingExpense">퇴직 후 생활비</label>
          <div class="input-wrap">
            <input type="number" id="livingExpense" value="0" min="0" step="10">
            <span class="unit">만원</span>
          </div>
        </div>
        <div class="field">
          <label for="birthDate">출생일</label>
          <div class="birth-row">
            <div class="input-wrap">
              <input type="date" id="birthDate" min="1900-01-01">
            </div>
            <button id="saveDefaults" class="save-btn" title="현재 입력값을 기본값으로 저장">저장</button>
          </div>
          <p class="field-hint" id="birth-hint" aria-live="polite"></p>
        </div>
      </div>
      <p class="notice" id="notice"></p>
    </section>

    <div class="results" id="results"></div>

    <section class="panel">
      <div class="panel-title">자산 성장 그래프 (10년)</div>
      <div class="chart-wrap">
        <canvas id="chart"></canvas>
      </div>
      <p class="chart-caption">X축: 1년 단위 · Y축: 총자산 규모별 억 단위 · 점선: <span style="color:#b45309">저축종료</span> · <span style="color:#2563eb">FIRE 달성</span> · <span style="color:#dc2626">자산소진</span> — 10년 이내 시점만 표시</p>
    </section>

    <section class="panel">
      <div class="panel-title">연도별 상세 (50년)</div>
      <table>
        <thead>
          <tr>
            <th>연차</th>
            <th>나이</th>
            <th>연말 잔액</th>
            <th>누적 납입</th>
            <th>누적 저축액</th>
            <th>누적 이자</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </section>
  </div>

  <script>
    const DEFAULTS = { monthlyManwon: 50, rate: 7, initialManwon: 0, contributionYears: 10, severanceManwon: 0, livingExpenseManwon: 0 };
    const MANWON = 10000;
    const EOK = 100000000;
    const MAX_YEARS = 10;
    const LONG_MONTHS = 600;
    let lastRefPoints = [];

    const monthlyInput = document.getElementById('monthly');
    const rateInput = document.getElementById('rate');
    const initialInput = document.getElementById('initial');
    const initialHintEl = document.getElementById('initial-hint');
    const contributionYearsInput = document.getElementById('contributionYears');
    const severanceInput = document.getElementById('severance');
    const livingExpenseInput = document.getElementById('livingExpense');
    const severanceHintEl = document.getElementById('severance-hint');
    const birthDateInput = document.getElementById('birthDate');
    const birthHintEl = document.getElementById('birth-hint');
    const saveDefaultsBtn = document.getElementById('saveDefaults');
    const noticeEl = document.getElementById('notice');
    const resultsEl = document.getElementById('results');
    const tableBody = document.getElementById('table-body');
    const canvas = document.getElementById('chart');
    const ctx = canvas.getContext('2d');

    (() => {
      const today = new Date();
      const yyyy = today.getFullYear();
      const mm = String(today.getMonth() + 1).padStart(2, '0');
      const dd = String(today.getDate()).padStart(2, '0');
      birthDateInput.max = `${yyyy}-${mm}-${dd}`;
    })();

    function calcAgeAt(birthDate, offsetMonths) {
      const base = new Date();
      base.setMonth(base.getMonth() + Math.round(offsetMonths));
      let age = base.getFullYear() - birthDate.getFullYear();
      const dm = base.getMonth() - birthDate.getMonth();
      if (dm < 0 || (dm === 0 && base.getDate() < birthDate.getDate())) age--;
      return age;
    }

    function parseBirthDate() {
      const raw = birthDateInput.value;
      if (!raw) return null;
      const d = new Date(raw);
      return isNaN(d) ? null : d;
    }

    function updateBirthHint() {
      const birth = parseBirthDate();
      if (!birth) { birthHintEl.textContent = ''; return; }
      birthHintEl.textContent = '현재 만 ' + calcAgeAt(birth, 0) + '세';
    }

    const STORAGE_KEY = 'fireSimDefaults';

    function saveDefaults() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        monthly: monthlyInput.value,
        rate: rateInput.value,
        initial: initialInput.value,
        contributionYears: contributionYearsInput.value,
        severance: severanceInput.value,
        livingExpense: livingExpenseInput.value,
        birthDate: birthDateInput.value,
      }));
      saveDefaultsBtn.textContent = '저장됨 ✓';
      saveDefaultsBtn.classList.add('saved');
      setTimeout(() => {
        saveDefaultsBtn.textContent = '저장';
        saveDefaultsBtn.classList.remove('saved');
      }, 1500);
    }

    function loadDefaults() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        const d = JSON.parse(raw);
        if (d.monthly !== undefined) monthlyInput.value = d.monthly;
        if (d.rate !== undefined) rateInput.value = d.rate;
        if (d.initial !== undefined) initialInput.value = d.initial;
        if (d.contributionYears !== undefined) contributionYearsInput.value = d.contributionYears;
        if (d.severance !== undefined) severanceInput.value = d.severance;
        if (d.livingExpense !== undefined) livingExpenseInput.value = d.livingExpense;
        if (d.birthDate !== undefined) birthDateInput.value = d.birthDate;
      } catch (e) {}
    }

    function parseInput(input, fallback) {
      const raw = input.value.trim();
      if (raw === '') return { value: fallback, corrected: true };
      const n = Number(raw);
      if (!Number.isFinite(n) || n < 0) return { value: fallback, corrected: true };
      return { value: n, corrected: false };
    }

    function formatReadableManwon(manwon) {
      if (!Number.isFinite(manwon) || manwon < 0) return '';
      if (manwon === 0) return '0원';

      const eok = Math.floor(manwon / 10000);
      const rest = manwon % 10000;
      let text = '';

      if (eok > 0) {
        text += eok.toLocaleString('ko-KR') + '억';
        if (rest > 0) text += ' ';
      }

      if (rest > 0) {
        const cheon = Math.floor(rest / 1000);
        const rem = rest % 1000;
        if (cheon > 0) text += cheon + '천';
        if (rem > 0) {
          if (cheon > 0) text += ' ';
          text += rem.toLocaleString('ko-KR') + '만원';
        } else {
          text += '만원';
        }
      } else if (eok > 0) {
        text += '원';
      }

      return text;
    }

    function updateManwonHint(input, hintEl) {
      const raw = input.value.trim();
      if (raw === '') {
        hintEl.textContent = '';
        return;
      }
      const n = Number(raw);
      if (!Number.isFinite(n) || n < 0) {
        hintEl.textContent = '';
        return;
      }
      hintEl.textContent = '→ ' + formatReadableManwon(n);
    }

    function updateInitialHint() {
      updateManwonHint(initialInput, initialHintEl);
    }

    function updateSeveranceHint() {
      updateManwonHint(severanceInput, severanceHintEl);
    }

    function formatWon(n) {
      return Math.round(n).toLocaleString('ko-KR') + '원';
    }

    function formatMonths(months) {
      const y = Math.floor(months / 12);
      const m = months % 12;
      if (y === 0) return m + '개월';
      if (m === 0) return y + '년';
      return y + '년 ' + m + '개월';
    }

    function simulate(monthly, annualRate, initial, totalMonths, contributionMonths, severance, livingExpense) {
      const monthlyRate = annualRate / 100 / 12;
      let balance = initial;
      const monthlyBalances = [initial];

      for (let m = 1; m <= totalMonths; m++) {
        if (contributionMonths === 0 && m === 1 && severance > 0) balance += severance;
        balance = balance * (1 + monthlyRate);
        if (contributionMonths > 0 && m <= contributionMonths) balance += monthly;
        if (contributionMonths > 0 && m === contributionMonths && severance > 0) balance += severance;
        if (m > contributionMonths && livingExpense > 0) {
          balance -= livingExpense;
          if (balance < 0) balance = 0;
        }
        monthlyBalances.push(balance);
      }

      return { balance, monthlyBalances };
    }

    function getSnapshot(monthlyBalances, months, monthly, initial, contributionMonths, severance) {
      const balance = monthlyBalances[months];
      const monthsContributed = Math.min(months, contributionMonths);
      const totalSavings = monthly * monthsContributed;
      const severanceReceived = months >= contributionMonths ? severance : 0;
      const totalContributed = initial + totalSavings + severanceReceived;
      const interest = balance - totalContributed;
      return { balance, totalContributed, totalSavings, interest };
    }

    function renderResults(monthly, rate, initial, contributionMonths, severance, livingExpense, longBalances, notices, birthDate) {
      const ageAt = (offsetMonths) => {
        if (!birthDate) return '';
        return ' · 만 ' + calcAgeAt(birthDate, offsetMonths) + '세';
      };

      const cards = [];

      // Card 1: 저축 종료 시
      const { balance: endBalance, totalContributed: endContributed, totalSavings: endSavings, interest: endInterest } =
        getSnapshot(longBalances, contributionMonths, monthly, initial, contributionMonths, severance);
      const endLabel = contributionMonths > 0 ? formatMonths(contributionMonths) + ' 후' : '현재';
      cards.push(`
        <div class="result-card">
          <div class="period">저축 종료 · ${endLabel}${ageAt(contributionMonths)}</div>
          <div class="amount">${formatWon(endBalance)}</div>
          <div class="meta">
            누적 저축 ${formatWon(endSavings)}${severance > 0 ? ' · 퇴직금 ' + formatWon(severance) : ''}<br>
            총 납입 ${formatWon(endContributed)} · 이자 수익 <span class="interest">+${formatWon(endInterest)}</span>
          </div>
        </div>
      `);

      // Card 2: FIRE 달성 (목표 10억)
      const fireTarget = 10 * EOK;
      let fireMonth = null;
      for (let m = 0; m <= LONG_MONTHS; m++) {
        if (longBalances[m] >= fireTarget) { fireMonth = m; break; }
      }

      if (fireMonth === 0) {
        cards.push(`
          <div class="result-card highlight">
            <div class="period">FIRE 달성 · 목표 10억${ageAt(0)}</div>
            <div class="amount">이미 달성!</div>
            <div class="meta">
              목표 자산 10억원<br>
              현재 잔액 <span class="interest">${formatWon(longBalances[0])}</span>
            </div>
          </div>
        `);
      } else if (fireMonth !== null) {
        cards.push(`
          <div class="result-card highlight">
            <div class="period">FIRE 달성 · 목표 10억${ageAt(fireMonth)}</div>
            <div class="amount">${formatMonths(fireMonth)} 후</div>
            <div class="meta">
              목표 자산 10억원<br>
              달성 시 잔액 <span class="interest">${formatWon(longBalances[fireMonth])}</span>
            </div>
          </div>
        `);
      } else {
        cards.push(`
          <div class="result-card highlight">
            <div class="period">FIRE 달성 · 목표 10억</div>
            <div class="amount-muted">50년 내 달성 어려움</div>
            <div class="meta">목표 자산 10억원<br>저축액·수익률을 높여보세요</div>
          </div>
        `);
      }

      // Card 3: 자산 소진
      let depletionMonth = null;
      if (livingExpense > 0) {
        for (let m = contributionMonths + 1; m <= LONG_MONTHS; m++) {
          if (longBalances[m] === 0) { depletionMonth = m; break; }
        }
      }

      if (livingExpense === 0) {
        cards.push(`
          <div class="result-card inactive">
            <div class="period">자산 소진</div>
            <div class="amount-muted">생활비를 입력하면<br>소진 시점을 계산합니다</div>
            <div class="meta"></div>
          </div>
        `);
      } else if (depletionMonth === null) {
        cards.push(`
          <div class="result-card positive">
            <div class="period">자산 소진</div>
            <div class="amount">소진되지 않음</div>
            <div class="meta">수익률이 생활비를 충당합니다</div>
          </div>
        `);
      } else {
        const depletionAfterRetirement = depletionMonth - contributionMonths;
        cards.push(`
          <div class="result-card">
            <div class="period">자산 소진${ageAt(depletionMonth)}</div>
            <div class="amount">퇴직 후 ${formatMonths(depletionAfterRetirement)}</div>
            <div class="meta">저축 종료 ${formatMonths(contributionMonths)} 후 소진</div>
          </div>
        `);
      }

      resultsEl.innerHTML = cards.join('');

      if (notices.length > 0) {
        noticeEl.textContent = notices.join(' ');
        noticeEl.classList.add('visible');
      } else {
        noticeEl.classList.remove('visible');
      }

      return { fireMonth, depletionMonth };
    }

    function renderTable(monthly, rate, initial, contributionMonths, severance, monthlyBalances, birthDate) {
      tableBody.innerHTML = '';
      for (let year = 1; year <= 50; year++) {
        const months = year * 12;
        const { balance, totalContributed, totalSavings, interest } = getSnapshot(monthlyBalances, months, monthly, initial, contributionMonths, severance);
        const ageCell = birthDate ? `<td>만 ${calcAgeAt(birthDate, months)}세</td>` : '<td>—</td>';
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${year}년</td>
          ${ageCell}
          <td>${formatWon(balance)}</td>
          <td>${formatWon(totalContributed)}</td>
          <td>${formatWon(totalSavings)}</td>
          <td class="interest-cell">+${formatWon(interest)}</td>
        `;
        tableBody.appendChild(tr);
      }
    }

    function getChartStepEok(maxEok) {
      return Math.max(1, Math.ceil(maxEok / 10));
    }

    function drawChart(monthlyBalances, refPoints = []) {
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      const W = rect.width;
      const H = rect.height;
      const pad = { top: 16, right: 16, bottom: 36, left: 52 };
      const plotW = W - pad.left - pad.right;
      const plotH = H - pad.top - pad.bottom;

      const totalYears = 10;
      const data = [];
      for (let y = 0; y <= totalYears; y++) {
        data.push(monthlyBalances[y * 12]);
      }

      const maxEok = Math.max(Math.ceil(Math.max(...data, 0) / EOK), 1);
      const stepEok = getChartStepEok(maxEok);
      const axisMaxEok = Math.ceil(maxEok / stepEok) * stepEok;
      const minVal = 0;
      const maxVal = axisMaxEok * EOK;

      const xScale = (year) => pad.left + (year / totalYears) * plotW;
      const yScale = (val) => pad.top + plotH - ((val - minVal) / (maxVal - minVal)) * plotH;

      ctx.clearRect(0, 0, W, H);

      // Grid lines (총자산 규모에 따른 억원 단위)
      ctx.strokeStyle = '#e2e5ea';
      ctx.lineWidth = 1;
      for (let eok = 0; eok <= axisMaxEok; eok += stepEok) {
        const val = eok * EOK;
        const y = yScale(val);
        ctx.beginPath();
        ctx.moveTo(pad.left, y);
        ctx.lineTo(pad.left + plotW, y);
        ctx.stroke();

        ctx.fillStyle = '#5c6370';
        ctx.font = '11px sans-serif';
        ctx.textAlign = 'right';
        ctx.textBaseline = 'middle';
        ctx.fillText(eok + '억', pad.left - 8, y);
      }

      // X-axis labels (1년 단위)
      ctx.fillStyle = '#5c6370';
      ctx.font = '11px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      for (let y = 0; y <= totalYears; y++) {
        const x = xScale(y);
        ctx.fillText(y + '년', x, pad.top + plotH + 8);
      }

      // Reference lines (event-based: 저축종료, FIRE, 소진)
      refPoints.forEach(({ month, label, color }) => {
        const yearPos = month / 12;
        const x = xScale(yearPos);
        ctx.strokeStyle = color;
        ctx.lineWidth = 1;
        ctx.setLineDash([4, 4]);
        ctx.beginPath();
        ctx.moveTo(x, pad.top);
        ctx.lineTo(x, pad.top + plotH);
        ctx.stroke();
        ctx.setLineDash([]);

        ctx.fillStyle = color;
        ctx.font = '10px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.fillText(label, x, pad.top - 2);
      });

      // Area fill
      ctx.beginPath();
      ctx.moveTo(xScale(0), yScale(data[0]));
      for (let y = 1; y <= totalYears; y++) {
        ctx.lineTo(xScale(y), yScale(data[y]));
      }
      ctx.lineTo(xScale(totalYears), yScale(minVal));
      ctx.lineTo(xScale(0), yScale(minVal));
      ctx.closePath();
      ctx.fillStyle = 'rgba(37, 99, 235, 0.08)';
      ctx.fill();

      // Line
      ctx.beginPath();
      ctx.moveTo(xScale(0), yScale(data[0]));
      for (let y = 1; y <= totalYears; y++) {
        ctx.lineTo(xScale(y), yScale(data[y]));
      }
      ctx.strokeStyle = '#2563eb';
      ctx.lineWidth = 2;
      ctx.stroke();

      // End dot
      const lastX = xScale(totalYears);
      const lastY = yScale(data[totalYears]);
      ctx.beginPath();
      ctx.arc(lastX, lastY, 4, 0, Math.PI * 2);
      ctx.fillStyle = '#2563eb';
      ctx.fill();
    }

    function recalculate() {
      const notices = [];

      const monthlyManwonParsed = parseInput(monthlyInput, DEFAULTS.monthlyManwon);
      const rateParsed = parseInput(rateInput, DEFAULTS.rate);
      const initialManwonParsed = parseInput(initialInput, DEFAULTS.initialManwon);
      const severanceManwonParsed = parseInput(severanceInput, DEFAULTS.severanceManwon);
      const livingExpenseManwonParsed = parseInput(livingExpenseInput, DEFAULTS.livingExpenseManwon);

      if (monthlyManwonParsed.corrected) {
        monthlyInput.value = monthlyManwonParsed.value;
        notices.push('월 저축액을 기본값으로 조정했습니다.');
      }
      if (rateParsed.corrected) {
        rateInput.value = rateParsed.value;
        notices.push('연 수익률을 기본값으로 조정했습니다.');
      }
      if (initialManwonParsed.corrected) {
        initialInput.value = initialManwonParsed.value;
        notices.push('초기 자산을 기본값으로 조정했습니다.');
      }
      if (severanceManwonParsed.corrected) {
        severanceInput.value = severanceManwonParsed.value;
        notices.push('퇴직금을 기본값으로 조정했습니다.');
      }
      if (livingExpenseManwonParsed.corrected) {
        livingExpenseInput.value = livingExpenseManwonParsed.value;
        notices.push('퇴직 후 생활비를 기본값으로 조정했습니다.');
      }

      const contributionYearsParsed = parseInput(contributionYearsInput, DEFAULTS.contributionYears);
      let contributionYears = Math.floor(contributionYearsParsed.value);
      if (contributionYearsParsed.corrected) {
        contributionYearsInput.value = contributionYearsParsed.value;
        notices.push('저축 기간을 기본값으로 조정했습니다.');
      }
      if (contributionYears > MAX_YEARS) {
        contributionYears = MAX_YEARS;
        contributionYearsInput.value = MAX_YEARS;
        notices.push('저축 기간은 최대 10년까지 설정할 수 있습니다.');
      }

      const monthly = monthlyManwonParsed.value * MANWON;
      const rate = rateParsed.value;
      const initial = initialManwonParsed.value * MANWON;
      const severance = severanceManwonParsed.value * MANWON;
      const livingExpense = livingExpenseManwonParsed.value * MANWON;
      const contributionMonths = contributionYears * 12;

      const { monthlyBalances: longBalances } = simulate(monthly, rate, initial, LONG_MONTHS, contributionMonths, severance, livingExpense);
      const shortBalances = longBalances.slice(0, 121);
      const { fireMonth, depletionMonth } = renderResults(monthly, rate, initial, contributionMonths, severance, livingExpense, longBalances, notices, parseBirthDate());
      renderTable(monthly, rate, initial, contributionMonths, severance, longBalances, parseBirthDate());

      lastRefPoints = [];
      if (contributionMonths > 0 && contributionMonths <= 120) {
        lastRefPoints.push({ month: contributionMonths, label: '저축종료', color: '#b45309' });
      }
      if (fireMonth !== null && fireMonth > 0 && fireMonth <= 120) {
        lastRefPoints.push({ month: fireMonth, label: 'FIRE', color: '#2563eb' });
      }
      if (depletionMonth !== null && depletionMonth <= 120) {
        lastRefPoints.push({ month: depletionMonth, label: '소진', color: '#dc2626' });
      }
      drawChart(shortBalances, lastRefPoints);
      updateInitialHint();
      updateSeveranceHint();
      updateBirthHint();
    }

    [monthlyInput, rateInput, initialInput, contributionYearsInput, severanceInput, livingExpenseInput].forEach((el) => {
      el.addEventListener('input', () => {
        if (/^0\d/.test(el.value)) el.value = String(Number(el.value));
        recalculate();
      });
    });

    birthDateInput.addEventListener('input', recalculate);
    saveDefaultsBtn.addEventListener('click', saveDefaults);

    loadDefaults();
    recalculate();

    window.addEventListener('resize', () => {
      const monthly = parseInput(monthlyInput, DEFAULTS.monthlyManwon).value * MANWON;
      const rate = parseInput(rateInput, DEFAULTS.rate).value;
      const initial = parseInput(initialInput, DEFAULTS.initialManwon).value * MANWON;
      const severance = parseInput(severanceInput, DEFAULTS.severanceManwon).value * MANWON;
      const livingExpense = parseInput(livingExpenseInput, DEFAULTS.livingExpenseManwon).value * MANWON;
      const contributionYears = Math.min(
        Math.floor(parseInput(contributionYearsInput, DEFAULTS.contributionYears).value),
        MAX_YEARS
      );
      const contributionMonths = contributionYears * 12;
      const { monthlyBalances } = simulate(monthly, rate, initial, 120, contributionMonths, severance, livingExpense);
      drawChart(monthlyBalances, lastRefPoints);
    });

    recalculate();
  </script>
</body>
</html>
