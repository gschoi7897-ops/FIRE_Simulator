<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>저축 시뮬레이터</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f6f8;
      --surface: #ffffff;
      --border: #e2e5ea;
      --text: #1a1d23;
      --text-secondary: #5c6370;
      --accent: #2563eb;
      --accent-light: #eff6ff;
      --interest: #059669;
      --interest-light: #ecfdf5;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }

    header {
      margin-bottom: 28px;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    header p {
      font-size: 0.875rem;
      color: var(--text-secondary);
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .panel-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .panel-brand {
      font-size: 0.875rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      color: var(--text);
    }

    .save-btn-compact {
      padding: 6px 14px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .panel-title {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-secondary);
      margin-bottom: 14px;
    }

    .inputs {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    @media (max-width: 900px) {
      .inputs { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 640px) {
      .inputs { grid-template-columns: minmax(0, 1fr); }
    }

    .field {
      min-width: 0;
    }

    .field-span-full {
      grid-column: 1 / -1;
    }

    .field-head {
      min-height: 52px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      margin-bottom: 6px;
    }

    .field-head label {
      margin-bottom: 0;
    }

    .field label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 500;
      margin-bottom: 6px;
    }

    .field .input-wrap {
      display: flex;
      align-items: center;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      background: var(--bg);
    }

    .field input {
      flex: 1;
      border: none;
      background: transparent;
      padding: 9px 12px;
      font-size: 1rem;
      font-family: inherit;
      color: var(--text);
      min-width: 0;
    }

    .field input:focus {
      outline: none;
    }

    .field input[type="date"] {
      color-scheme: light;
    }

    /* 출생일 통합 입력 */
    .birth-date-field .input-wrap {
      width: 100%;
    }

    .save-btn-block {
      width: 100%;
      padding-top: 9px;
      padding-bottom: 9px;
    }

    .field input::placeholder {
      color: #9ca3af;
    }

    /* 저축년수 or 퇴직년월 헤더 */
    .contrib-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }

    .contrib-header label { margin-bottom: 0; }

    /* 토글바 */
    .contrib-toggle {
      display: flex;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2px;
      gap: 2px;
    }

    .toggle-btn {
      padding: 3px 8px;
      border: none;
      border-radius: 18px;
      font-size: 0.6875rem;
      font-weight: 500;
      font-family: inherit;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .toggle-btn.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 1px 3px rgba(37,99,235,0.25);
    }

    .toggle-btn:hover:not(.active) {
      background: var(--accent-light);
      color: var(--accent);
    }

    /* 퇴직년월 (숫자 입력 필드) */
    .contrib-date-inputs {
      display: flex;
      gap: 6px;
    }

    .contrib-date-inputs .input-wrap { flex: 1; }

    .save-btn {
      flex-shrink: 0;
      padding: 9px 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.8125rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }

    .save-btn:hover { background: #1d4ed8; }
    .save-btn:active { background: #1e40af; }
    .save-btn.saved { background: var(--interest); }
    .share-btn { background: #6366f1; }
    .share-btn:hover { background: #4f46e5; }
    .share-btn:active { background: #4338ca; }
    .share-btn.copied { background: var(--interest); }

    .field .input-wrap:focus-within {
      border-color: var(--accent);
      background: var(--surface);
    }

    .field .unit {
      flex-shrink: 0;
      padding: 0 10px;
      font-size: 0.8125rem;
      color: var(--text-secondary);
      white-space: nowrap;
      border-left: 1px solid var(--border);
      background: var(--surface);
    }

    .field-hint {
      margin-top: 5px;
      font-size: 0.75rem;
      color: var(--accent);
      min-height: 1.125rem;
      word-break: keep-all;
    }

    .field-hint:empty {
      display: none;
    }

    .notice {
      margin-top: 12px;
      font-size: 0.8125rem;
      color: #b45309;
      display: none;
    }

    .notice.visible { display: block; }

    .results {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 20px;
    }

    @media (max-width: 640px) {
      .results { grid-template-columns: 1fr; }
    }

    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 16px;
    }

    .result-card.highlight {
      border-color: var(--accent);
      background: var(--accent-light);
    }

    .result-card .period {
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    .result-card.highlight .period {
      color: var(--accent);
    }

    .result-card .amount {
      font-size: 1.375rem;
      font-weight: 700;
      margin-bottom: 10px;
      word-break: break-all;
    }

    .result-card .meta {
      font-size: 0.75rem;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    .result-card .meta .interest {
      color: var(--interest);
      font-weight: 500;
    }

    .result-card.inactive {
      opacity: 0.55;
      border-style: dashed;
    }

    .result-card.positive {
      border-color: var(--interest);
      background: var(--interest-light);
    }

    .result-card.positive .period {
      color: var(--interest);
    }

    .result-card .amount-muted {
      font-size: 0.875rem;
      font-weight: 400;
      color: var(--text-secondary);
      margin-bottom: 10px;
      line-height: 1.5;
    }

    .chart-wrap {
      position: relative;
      margin-bottom: 8px;
    }

    canvas {
      display: block;
      width: 100%;
      height: 260px;
    }

    .chart-caption {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8125rem;
    }

    thead th {
      text-align: left;
      padding: 10px 12px;
      font-weight: 600;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--border);
      font-size: 0.75rem;
    }

    thead th:not(:first-child) {
      text-align: right;
    }

    tbody td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
    }

    tbody td:not(:first-child) {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    tbody tr:hover {
      background: var(--bg);
    }

    tbody td.interest-cell {
      color: var(--interest);
    }

    tbody td.expense-cell {
      color: #b45309;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>저축 시뮬레이터</h1>
      <p>매월 말 납입 · 저축 기간 이후 납입 중단 · 저축 종료 시 퇴직금 일시 반영 · 퇴직 후 생활비 매년 물가상승률 반영 · 월복리 가정 · 세금 미반영</p>
    </header>

    <section class="panel">
      <div class="panel-top">
        <span class="panel-brand">FIRE-SIMULATOR</span>
        <div style="display:flex;gap:6px">
          <button id="shareBtn" class="save-btn save-btn-compact share-btn" title="현재 설정을 URL로 공유">공유</button>
          <button id="saveDefaults" class="save-btn save-btn-compact" title="현재 입력값을 기본값으로 저장">저장</button>
        </div>
      </div>
      <div class="inputs">
        <div class="field">
          <div class="field-head">
            <label for="monthly">월 저축액</label>
          </div>
          <div class="input-wrap">
            <input type="number" id="monthly" value="50" min="0" step="10">
            <span class="unit">만원</span>
          </div>
        </div>
        <div class="field">
          <div class="field-head">
            <div class="contrib-header">
              <label>저축년수 or 퇴직년월</label>
              <div class="contrib-toggle">
                <button class="toggle-btn active" id="tab-years">저축년수</button>
                <button class="toggle-btn" id="tab-date">퇴직년월</button>
              </div>
            </div>
          </div>
          <div id="contrib-years-wrap">
            <div class="input-wrap">
              <input type="number" id="contributionYears" value="10" min="0" max="20" step="1">
              <span class="unit">년</span>
            </div>
          </div>
          <div id="contrib-date-wrap" class="contrib-date-inputs" style="display:none">
            <div class="input-wrap">
              <input type="number" id="retireYear" value="2030" min="2024" max="2100" step="1">
              <span class="unit">년</span>
            </div>
            <div class="input-wrap">
              <input type="number" id="retireMonth" value="1" min="1" max="12" step="1">
              <span class="unit">월</span>
            </div>
          </div>
          <p class="field-hint" id="contrib-hint" aria-live="polite"></p>
        </div>
        <div class="field">
          <div class="field-head">
            <label for="initial">초기 자산</label>
          </div>
          <div class="input-wrap">
            <input type="number" id="initial" value="0" min="0" step="1000">
            <span class="unit">만원</span>
          </div>
          <p class="field-hint" id="initial-hint" aria-live="polite"></p>
        </div>
        <div class="field">
          <label for="severance">퇴직금</label>
          <div class="input-wrap">
            <input type="number" id="severance" value="0" min="0" step="1000">
            <span class="unit">만원</span>
          </div>
          <p class="field-hint" id="severance-hint" aria-live="polite"></p>
        </div>
        <div class="field">
          <label for="rate">연 수익률</label>
          <div class="input-wrap">
            <input type="number" id="rate" value="7" min="0" max="100" step="1">
            <span class="unit">%</span>
          </div>
        </div>
      </div>
      <p class="notice" id="notice"></p>
    </section>

    <section class="panel">
      <div class="panel-title">소비성향</div>
      <div class="inputs">
        <div class="field birth-date-field">
          <label for="birthDate">출생일</label>
          <div class="input-wrap">
            <input type="text" id="birthDate" inputmode="numeric" placeholder="1990-01-15" maxlength="10" spellcheck="false" autocomplete="bday">
          </div>
          <p class="field-hint" id="birth-hint" aria-live="polite"></p>
        </div>
        <div class="field">
          <label for="lifeExpectancy">예상수명</label>
          <div class="input-wrap">
            <input type="number" id="lifeExpectancy" value="90" min="1" max="150" step="1">
            <span class="unit">세</span>
          </div>
        </div>
        <div class="field">
          <label for="livingExpense">퇴직 후 생활비</label>
          <div class="input-wrap">
            <input type="number" id="livingExpense" value="0" min="0" step="10">
            <span class="unit">만원</span>
          </div>
        </div>
        <div class="field">
          <label for="inflationRate">물가상승률</label>
          <div class="input-wrap">
            <input type="number" id="inflationRate" value="3" min="0" max="100" step="0.1">
            <span class="unit">%</span>
          </div>
        </div>
      </div>
    </section>

    <div class="results" id="results"></div>

    <section class="panel">
      <div class="panel-title">국민연금</div>
      <div class="inputs">
        <div class="field">
          <label for="pensionMonthly">국민연금 월 수령액 (세후)</label>
          <div class="input-wrap">
            <input type="number" id="pensionMonthly" value="0" min="0" step="1">
            <span class="unit">만원</span>
          </div>
          <p class="field-hint" id="pension-monthly-hint" aria-live="polite"></p>
        </div>
        <div class="field">
          <label for="pensionAge">연금 수령 시작 나이</label>
          <div class="input-wrap">
            <input type="number" id="pensionAge" value="65" min="1" max="100" step="1">
            <span class="unit">세</span>
          </div>
          <p class="field-hint" id="pension-age-hint" aria-live="polite"></p>
        </div>
      </div>
    </section>

    <section class="panel">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div class="panel-title" style="margin-bottom:0" id="chart-panel-title">자산 성장 그래프 (20년)</div>
        <div class="contrib-toggle">
          <button class="toggle-btn active" id="chart-tab-20">20년</button>
          <button class="toggle-btn" id="chart-tab-40">40년</button>
          <button class="toggle-btn" id="chart-tab-life">수명까지</button>
        </div>
      </div>
      <div class="chart-wrap">
        <canvas id="chart"></canvas>
      </div>
      <p class="chart-caption" id="chart-caption">X축: 1년 단위 · Y축: 총자산 규모별 억 단위 · 점선: <span style="color:#b45309">저축종료</span> · <span style="color:#2563eb">FIRE 달성</span> · <span style="color:#dc2626">자산소진</span></p>
    </section>

    <section class="panel">
      <div class="panel-title" id="table-panel-title">연도별 상세</div>
      <table>
        <thead>
          <tr>
            <th>연차</th>
            <th>나이</th>
            <th>연말 잔액</th>
            <th>누적 납입</th>
            <th>누적 저축액</th>
            <th id="expense-col-header">연간 생활비</th>
            <th>누적 이자</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </section>
  </div>

  <script>
    const DEFAULTS = {
      monthlyManwon: 50,
      rate: 7,
      initialManwon: 0,
      contributionYears: 10,
      severanceManwon: 0,
      livingExpenseManwon: 0,
      inflationRate: 3,
      lifeExpectancy: 90,
      birthDate: '',
      retireMonth: 1,
      contribMode: 'years',
      pensionMonthlyManwon: 0,
      pensionAge: 65,
    };
    const MANWON = 10000;
    const EOK = 100000000;
    const MAX_YEARS = 20;
    const DEFAULT_SIM_YEARS = 50;
    const CHART_YEARS = 20;
    let lastRefPoints = [];
    let contribMode = 'years';
    let chartViewMode = '20';
    let lastLongBalances = [];
    let lastSimYears = DEFAULT_SIM_YEARS;
    let lastContributionMonths = 0;
    let lastFireMonth = null;
    let lastDepletionMonth = null;

    const monthlyInput        = document.getElementById('monthly');
    const rateInput           = document.getElementById('rate');
    const initialInput        = document.getElementById('initial');
    const initialHintEl       = document.getElementById('initial-hint');
    const contributionYearsInput = document.getElementById('contributionYears');
    const severanceInput      = document.getElementById('severance');
    const livingExpenseInput  = document.getElementById('livingExpense');
    const inflationRateInput  = document.getElementById('inflationRate');
    const severanceHintEl     = document.getElementById('severance-hint');
    const birthDateInput      = document.getElementById('birthDate');
    const lifeExpectancyInput = document.getElementById('lifeExpectancy');
    const birthHintEl         = document.getElementById('birth-hint');
    const saveDefaultsBtn     = document.getElementById('saveDefaults');
    const shareBtnEl          = document.getElementById('shareBtn');
    const pensionMonthlyInput = document.getElementById('pensionMonthly');
    const pensionAgeInput     = document.getElementById('pensionAge');
    const pensionMonthlyHintEl= document.getElementById('pension-monthly-hint');
    const pensionAgeHintEl    = document.getElementById('pension-age-hint');
    const noticeEl            = document.getElementById('notice');
    const resultsEl           = document.getElementById('results');
    const tableBody           = document.getElementById('table-body');
    const tablePanelTitleEl   = document.getElementById('table-panel-title');
    const canvas              = document.getElementById('chart');
    const ctx                 = canvas.getContext('2d');
    const tabYearsBtn         = document.getElementById('tab-years');
    const tabDateBtn          = document.getElementById('tab-date');
    const contribYearsWrap    = document.getElementById('contrib-years-wrap');
    const contribDateWrap     = document.getElementById('contrib-date-wrap');
    const retireYearInput     = document.getElementById('retireYear');
    const retireMonthInput    = document.getElementById('retireMonth');
    const contribHintEl       = document.getElementById('contrib-hint');

    /* ── 초기화 ── */
    (() => {
      const thisYear = new Date().getFullYear();
      retireYearInput.min = thisYear;
      retireYearInput.value = thisYear + 5;
    })();

    function formatBirthDateDigits(digits) {
      digits = digits.replace(/\D/g, '').slice(0, 8);
      if (digits.length <= 4) return digits;
      if (digits.length <= 6) return digits.slice(0, 4) + '-' + digits.slice(4);
      return digits.slice(0, 4) + '-' + digits.slice(4, 6) + '-' + digits.slice(6, 8);
    }

    function handleBirthDateInput() {
      const input = birthDateInput;
      const start = input.selectionStart ?? input.value.length;
      const digitsBefore = input.value.slice(0, start).replace(/\D/g, '').length;
      const formatted = formatBirthDateDigits(input.value);
      input.value = formatted;

      let newPos = formatted.length;
      if (digitsBefore < 8) {
        let count = 0;
        newPos = 0;
        for (let i = 0; i < formatted.length; i++) {
          if (/\d/.test(formatted[i])) count++;
          newPos = i + 1;
          if (count >= digitsBefore) break;
        }
      }
      input.setSelectionRange(newPos, newPos);
      recalculate();
    }

    /* ── 나이 계산 ── */
    function calcAgeAt(birthDate, offsetMonths) {
      const base = new Date();
      base.setMonth(base.getMonth() + Math.round(offsetMonths));
      let age = base.getFullYear() - birthDate.getFullYear();
      const dm = base.getMonth() - birthDate.getMonth();
      if (dm < 0 || (dm === 0 && base.getDate() < birthDate.getDate())) age--;
      return age;
    }

    function parseBirthDate() {
      const raw = birthDateInput.value.trim();
      if (!raw) return null;
      const m = raw.match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if (!m) return null;
      const year = parseInt(m[1], 10);
      const month = parseInt(m[2], 10);
      const day = parseInt(m[3], 10);
      const today = new Date();
      if (year < 1900 || year > today.getFullYear()) return null;
      const d = new Date(year, month - 1, day);
      if (isNaN(d.getTime()) || d.getMonth() !== month - 1 || d.getDate() !== day) return null;
      if (d > today) return null;
      return d;
    }

    /* ── 국민연금 시작 시점 계산 ── */
    function calcPensionStartMonth(birthDate, pensionAge) {
      if (!birthDate || pensionAge <= 0) return null;
      const today = new Date();
      const start = new Date(birthDate);
      start.setFullYear(start.getFullYear() + pensionAge);
      if (start <= today) return 0; // 이미 수령 중
      return (start.getFullYear() - today.getFullYear()) * 12
           + (start.getMonth() - today.getMonth());
    }

    function updatePensionHints() {
      const pm = Number(pensionMonthlyInput.value) || 0;
      pensionMonthlyHintEl.textContent = pm > 0 ? '→ 연 ' + formatReadableManwon(pm * 12) : '';

      const age = Math.floor(Number(pensionAgeInput.value) || 0);
      const birth = parseBirthDate();
      if (!birth) {
        pensionAgeHintEl.textContent = pm > 0 ? '출생일을 입력하면 시작 시점을 확인할 수 있습니다' : '';
        return;
      }
      if (age <= 0) { pensionAgeHintEl.textContent = ''; return; }
      const startMonth = calcPensionStartMonth(birth, age);
      if (startMonth === 0) {
        pensionAgeHintEl.textContent = '이미 수령 중';
      } else if (startMonth !== null) {
        const startDate = new Date(birth);
        startDate.setFullYear(startDate.getFullYear() + age);
        pensionAgeHintEl.textContent = '→ ' + startDate.getFullYear() + '년 ' + (startDate.getMonth() + 1) + '월부터 (' + formatMonths(startMonth) + ' 후)';
      }
    }

    function calcSimYears(birthDate, lifeExpectancy) {
      if (birthDate && lifeExpectancy > 0) {
        const remaining = lifeExpectancy - calcAgeAt(birthDate, 0);
        if (remaining > 0) return remaining;
      }
      if (lifeExpectancy > 0) return lifeExpectancy;
      return DEFAULT_SIM_YEARS;
    }

    function calcSimMonths(birthDate, lifeExpectancy) {
      return calcSimYears(birthDate, lifeExpectancy) * 12;
    }

    function calcRetirementLivingExpense(baseExpense, inflationRate, retirementMonth) {
      const yearIndex = Math.floor((retirementMonth - 1) / 12);
      return baseExpense * Math.pow(1 + inflationRate / 100, yearIndex);
    }

    function updateBirthHint() {
      const raw = birthDateInput.value.trim();
      if (!raw) { birthHintEl.textContent = ''; return; }
      const birth = parseBirthDate();
      if (birth) {
        birthHintEl.textContent = '현재 만 ' + calcAgeAt(birth, 0) + '세';
        return;
      }
      const digits = raw.replace(/\D/g, '');
      if (digits.length < 8) birthHintEl.textContent = 'YYYY-MM-DD 형식 (숫자 8자리)';
      else birthHintEl.textContent = '올바른 날짜를 입력하세요';
    }

    /* ── 토글 모드 ── */
    function setContribMode(mode) {
      contribMode = mode;
      if (mode === 'years') {
        tabYearsBtn.classList.add('active');
        tabDateBtn.classList.remove('active');
        contribYearsWrap.style.display = '';
        contribDateWrap.style.display = 'none';
        contribHintEl.textContent = '';
      } else {
        tabDateBtn.classList.add('active');
        tabYearsBtn.classList.remove('active');
        contribYearsWrap.style.display = 'none';
        contribDateWrap.style.display = '';
        updateContribHint();
      }
    }

    /* ── 퇴직년월 계산 ── */
    function calcContribMonthsFromDate() {
      const today = new Date();
      const year  = parseInt(retireYearInput.value, 10);
      let month   = parseInt(retireMonthInput.value, 10);
      if (!year) return 0;
      if (isNaN(month) || month < 1) month = 1;
      if (month > 12) month = 12;
      const diff = (year - today.getFullYear()) * 12 + (month - 1 - today.getMonth());
      return Math.max(0, diff);
    }

    function updateContribHint() {
      if (contribMode !== 'date') { contribHintEl.textContent = ''; return; }
      const months = calcContribMonthsFromDate();
      if (months === 0) { contribHintEl.textContent = '이미 지난 날짜입니다'; return; }
      contribHintEl.textContent = '→ ' + formatMonths(months) + ' 후 (' + months + '개월)';
    }

    /* ── URL 공유 ── */
    function buildShareURL() {
      const params = new URLSearchParams();
      params.set('m',    monthlyInput.value);
      params.set('r',    rateInput.value);
      params.set('i',    initialInput.value);
      params.set('sv',   severanceInput.value);
      params.set('ex',   livingExpenseInput.value);
      params.set('ir',   inflationRateInput.value);
      params.set('bd',   birthDateInput.value);
      params.set('lx',   lifeExpectancyInput.value);
      params.set('mode', contribMode);
      if (contribMode === 'years') {
        params.set('cy', contributionYearsInput.value);
      } else {
        params.set('ry', retireYearInput.value);
        params.set('rm', retireMonthInput.value);
      }
      params.set('pm', pensionMonthlyInput.value);
      params.set('pa', pensionAgeInput.value);
      return location.origin + location.pathname + '?' + params.toString();
    }

    function loadFromURL() {
      const params = new URLSearchParams(location.search);
      if (!params.has('m') && !params.has('r')) return;
      if (params.has('m'))  monthlyInput.value = params.get('m');
      if (params.has('r'))  rateInput.value = params.get('r');
      if (params.has('i'))  initialInput.value = params.get('i');
      if (params.has('sv')) severanceInput.value = params.get('sv');
      if (params.has('ex')) livingExpenseInput.value = params.get('ex');
      if (params.has('ir')) inflationRateInput.value = params.get('ir');
      if (params.has('bd')) birthDateInput.value = params.get('bd');
      if (params.has('lx')) lifeExpectancyInput.value = params.get('lx');
      if (params.has('pm')) pensionMonthlyInput.value = params.get('pm');
      if (params.has('pa')) pensionAgeInput.value = params.get('pa');
      const mode = params.get('mode') || 'years';
      if (mode === 'date') {
        setContribMode('date');
        if (params.has('ry')) retireYearInput.value = params.get('ry');
        if (params.has('rm')) retireMonthInput.value = params.get('rm');
      } else {
        setContribMode('years');
        if (params.has('cy')) contributionYearsInput.value = params.get('cy');
      }
    }

    shareBtnEl.addEventListener('click', () => {
      const url = buildShareURL();
      const finish = (ok) => {
        shareBtnEl.textContent = ok ? '복사됨 ✓' : 'URL 복사 실패';
        shareBtnEl.classList.add('copied');
        setTimeout(() => {
          shareBtnEl.textContent = '공유';
          shareBtnEl.classList.remove('copied');
        }, 1800);
      };
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(url).then(() => finish(true)).catch(() => {
          prompt('아래 URL을 복사하세요:', url);
          finish(true);
        });
      } else {
        prompt('아래 URL을 복사하세요:', url);
        finish(true);
      }
    });

    /* ── 저장/불러오기 ── */
    const STORAGE_KEY = 'fireSimDefaults_v2';

    function applyBuiltInDefaults() {
      monthlyInput.value = DEFAULTS.monthlyManwon;
      rateInput.value = DEFAULTS.rate;
      initialInput.value = DEFAULTS.initialManwon;
      contributionYearsInput.value = DEFAULTS.contributionYears;
      severanceInput.value = DEFAULTS.severanceManwon;
      livingExpenseInput.value = DEFAULTS.livingExpenseManwon;
      inflationRateInput.value = DEFAULTS.inflationRate;
      lifeExpectancyInput.value = DEFAULTS.lifeExpectancy;
      birthDateInput.value = DEFAULTS.birthDate;
      retireMonthInput.value = DEFAULTS.retireMonth;
      retireYearInput.value = new Date().getFullYear() + 5;
      pensionMonthlyInput.value = DEFAULTS.pensionMonthlyManwon;
      pensionAgeInput.value = DEFAULTS.pensionAge;
      setContribMode(DEFAULTS.contribMode);
    }

    function saveDefaults() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        monthly: monthlyInput.value,
        rate: rateInput.value,
        initial: initialInput.value,
        contributionYears: contributionYearsInput.value,
        severance: severanceInput.value,
        livingExpense: livingExpenseInput.value,
        inflationRate: inflationRateInput.value,
        birthDate: birthDateInput.value,
        lifeExpectancy: lifeExpectancyInput.value,
        contribMode,
        retireYear: retireYearInput.value,
        retireMonth: retireMonthInput.value,
        pensionMonthly: pensionMonthlyInput.value,
        pensionAge: pensionAgeInput.value,
      }));
      saveDefaultsBtn.textContent = '저장됨 ✓';
      saveDefaultsBtn.classList.add('saved');
      setTimeout(() => {
        saveDefaultsBtn.textContent = '저장';
        saveDefaultsBtn.classList.remove('saved');
      }, 1500);
    }

    function loadDefaults() {
      try {
        let raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) raw = localStorage.getItem('fireSimDefaults');
        if (!raw) return;
        const d = JSON.parse(raw);
        if (d.monthly !== undefined)        monthlyInput.value = d.monthly;
        if (d.rate !== undefined)           rateInput.value = d.rate;
        if (d.initial !== undefined)        initialInput.value = d.initial;
        if (d.contributionYears !== undefined) contributionYearsInput.value = d.contributionYears;
        if (d.severance !== undefined)      severanceInput.value = d.severance;
        if (d.livingExpense !== undefined)  livingExpenseInput.value = d.livingExpense;
        if (d.inflationRate !== undefined) inflationRateInput.value = d.inflationRate;
        if (d.birthDate !== undefined) {
          birthDateInput.value = d.birthDate;
        } else if (d.birthYear !== undefined && d.birthMonth !== undefined && d.birthDay !== undefined) {
          const y = String(d.birthYear).padStart(4, '0');
          const mo = String(d.birthMonth).padStart(2, '0');
          const da = String(d.birthDay).padStart(2, '0');
          birthDateInput.value = `${y}-${mo}-${da}`;
        }
        if (d.lifeExpectancy !== undefined) lifeExpectancyInput.value = d.lifeExpectancy;
        if (d.retireYear !== undefined)  retireYearInput.value = d.retireYear;
        if (d.retireMonth !== undefined) retireMonthInput.value = d.retireMonth;
        if (d.pensionMonthly !== undefined) pensionMonthlyInput.value = d.pensionMonthly;
        if (d.pensionAge !== undefined)     pensionAgeInput.value = d.pensionAge;
        if (d.contribMode) setContribMode(d.contribMode);
      } catch (e) {}
    }

    /* ── 입력 파싱 ── */
    function parseInput(input, fallback) {
      const raw = input.value.trim();
      if (raw === '') return { value: fallback, corrected: true };
      const n = Number(raw);
      if (!Number.isFinite(n) || n < 0) return { value: fallback, corrected: true };
      return { value: n, corrected: false };
    }

    /* ── 금액 포맷 ── */
    function formatReadableManwon(manwon) {
      if (!Number.isFinite(manwon) || manwon < 0) return '';
      if (manwon === 0) return '0원';
      const eok = Math.floor(manwon / 10000);
      const rest = manwon % 10000;
      let text = '';
      if (eok > 0) { text += eok.toLocaleString('ko-KR') + '억'; if (rest > 0) text += ' '; }
      if (rest > 0) {
        const cheon = Math.floor(rest / 1000);
        const rem   = rest % 1000;
        if (cheon > 0) text += cheon + '천';
        if (rem > 0) { if (cheon > 0) text += ' '; text += rem.toLocaleString('ko-KR') + '만원'; }
        else text += '만원';
      } else if (eok > 0) { text += '원'; }
      return text;
    }

    function updateManwonHint(input, hintEl) {
      const n = Number(input.value.trim());
      hintEl.textContent = (input.value.trim() === '' || !Number.isFinite(n) || n < 0)
        ? '' : '→ ' + formatReadableManwon(n);
    }

    function updateInitialHint()   { updateManwonHint(initialInput,   initialHintEl); }
    function updateSeveranceHint() { updateManwonHint(severanceInput, severanceHintEl); }

    function formatWon(n) { return Math.round(n).toLocaleString('ko-KR') + '원'; }

    function formatMonths(months) {
      const y = Math.floor(months / 12), m = months % 12;
      if (y === 0) return m + '개월';
      if (m === 0) return y + '년';
      return y + '년 ' + m + '개월';
    }

    /* ── 시뮬레이션 ── */
    function simulate(monthly, annualRate, initial, totalMonths, contributionMonths, severance, livingExpense, inflationRate, pensionMonthly, pensionStartMonth) {
      const monthlyRate = annualRate / 100 / 12;
      let balance = initial;
      const monthlyBalances = [initial];
      for (let m = 1; m <= totalMonths; m++) {
        if (contributionMonths === 0 && m === 1 && severance > 0) balance += severance;
        balance = balance * (1 + monthlyRate);
        if (contributionMonths > 0 && m <= contributionMonths) balance += monthly;
        if (contributionMonths > 0 && m === contributionMonths && severance > 0) balance += severance;
        if (m > contributionMonths && livingExpense > 0) {
          const retirementMonth = m - contributionMonths;
          const grossExpense = calcRetirementLivingExpense(livingExpense, inflationRate, retirementMonth);
          const pension = (pensionMonthly > 0 && pensionStartMonth !== null && m >= pensionStartMonth) ? pensionMonthly : 0;
          const netExpense = Math.max(0, grossExpense - pension);
          balance -= netExpense;
          if (balance < 0) balance = 0;
        }
        monthlyBalances.push(balance);
      }
      return { balance, monthlyBalances };
    }

    function getSnapshot(monthlyBalances, months, monthly, initial, contributionMonths, severance) {
      const balance = monthlyBalances[months];
      const monthsContributed = Math.min(months, contributionMonths);
      const totalSavings = monthly * monthsContributed;
      const severanceReceived = months >= contributionMonths ? severance : 0;
      const totalContributed = initial + totalSavings + severanceReceived;
      return { balance, totalContributed, totalSavings, interest: balance - totalContributed };
    }

    /* ── 결과 카드 ── */
    function renderResults(monthly, rate, initial, contributionMonths, severance, livingExpense, longBalances, notices, birthDate, simYears) {
      const ageAt = (mo) => birthDate ? ' · 만 ' + calcAgeAt(birthDate, mo) + '세' : '';
      const cards = [];
      const simMonths = longBalances.length - 1;

      const { balance: endBalance, totalContributed: endContributed, totalSavings: endSavings, interest: endInterest } =
        getSnapshot(longBalances, contributionMonths, monthly, initial, contributionMonths, severance);
      cards.push(`
        <div class="result-card">
          <div class="period">저축 종료 · ${contributionMonths > 0 ? formatMonths(contributionMonths) + ' 후' : '현재'}${ageAt(contributionMonths)}</div>
          <div class="amount">${formatWon(endBalance)}</div>
          <div class="meta">
            누적 저축 ${formatWon(endSavings)}${severance > 0 ? ' · 퇴직금 ' + formatWon(severance) : ''}<br>
            총 납입 ${formatWon(endContributed)} · 이자 수익 <span class="interest">+${formatWon(endInterest)}</span>
          </div>
        </div>`);

      const fireTarget = 10 * EOK;
      let fireMonth = null;
      for (let m = 0; m <= simMonths; m++) { if (longBalances[m] >= fireTarget) { fireMonth = m; break; } }

      if (fireMonth === 0) {
        cards.push(`<div class="result-card highlight"><div class="period">FIRE 달성 · 목표 10억${ageAt(0)}</div><div class="amount">이미 달성!</div><div class="meta">목표 자산 10억원<br>현재 잔액 <span class="interest">${formatWon(longBalances[0])}</span></div></div>`);
      } else if (fireMonth !== null) {
        cards.push(`<div class="result-card highlight"><div class="period">FIRE 달성 · 목표 10억${ageAt(fireMonth)}</div><div class="amount">${formatMonths(fireMonth)} 후</div><div class="meta">목표 자산 10억원<br>달성 시 잔액 <span class="interest">${formatWon(longBalances[fireMonth])}</span></div></div>`);
      } else {
        cards.push(`<div class="result-card highlight"><div class="period">FIRE 달성 · 목표 10억</div><div class="amount-muted">${simYears}년 내 달성 어려움</div><div class="meta">목표 자산 10억원<br>저축액·수익률을 높여보세요</div></div>`);
      }

      let depletionMonth = null;
      if (livingExpense > 0) {
        for (let m = contributionMonths + 1; m <= simMonths; m++) { if (longBalances[m] === 0) { depletionMonth = m; break; } }
      }

      if (livingExpense === 0) {
        cards.push(`<div class="result-card inactive"><div class="period">자산 소진</div><div class="amount-muted">생활비를 입력하면<br>소진 시점을 계산합니다</div><div class="meta"></div></div>`);
      } else if (depletionMonth === null) {
        cards.push(`<div class="result-card positive"><div class="period">자산 소진</div><div class="amount">소진되지 않음</div><div class="meta">수익률이 생활비(물가상승 반영)를 충당합니다</div></div>`);
      } else {
        cards.push(`<div class="result-card"><div class="period">자산 소진${ageAt(depletionMonth)}</div><div class="amount">퇴직 후 ${formatMonths(depletionMonth - contributionMonths)}</div><div class="meta">저축 종료 ${formatMonths(contributionMonths)} 후 소진</div></div>`);
      }

      resultsEl.innerHTML = cards.join('');
      if (notices.length > 0) { noticeEl.textContent = notices.join(' '); noticeEl.classList.add('visible'); }
      else noticeEl.classList.remove('visible');
      return { fireMonth, depletionMonth };
    }

    /* ── 연도별 테이블 ── */
    function calcYearlyLivingExpense(year, contributionMonths, livingExpense, inflationRate, pensionMonthly, pensionStartMonth) {
      if (year * 12 <= contributionMonths) return null;
      if (livingExpense <= 0) return null;
      let total = 0;
      for (let m = (year - 1) * 12 + 1; m <= year * 12; m++) {
        if (m > contributionMonths) {
          const gross = calcRetirementLivingExpense(livingExpense, inflationRate, m - contributionMonths);
          const pension = (pensionMonthly > 0 && pensionStartMonth !== null && m >= pensionStartMonth) ? pensionMonthly : 0;
          total += Math.max(0, gross - pension);
        }
      }
      return total;
    }

    function renderTable(monthly, rate, initial, contributionMonths, severance, monthlyBalances, birthDate, lifeExpectancy, livingExpense, inflationRate, pensionMonthly, pensionStartMonth) {
      tableBody.innerHTML = '';
      const maxYears = calcSimYears(birthDate, lifeExpectancy);
      if (birthDate && lifeExpectancy > 0) {
        tablePanelTitleEl.textContent = `연도별 상세 (만 ${lifeExpectancy}세까지 · ${maxYears}년)`;
      } else if (lifeExpectancy > 0) {
        tablePanelTitleEl.textContent = `연도별 상세 (${lifeExpectancy}년)`;
      } else {
        tablePanelTitleEl.textContent = `연도별 상세 (${DEFAULT_SIM_YEARS}년)`;
      }
      const expenseColHeader = document.getElementById('expense-col-header');
      if (expenseColHeader) {
        expenseColHeader.textContent = (pensionMonthly > 0 && pensionStartMonth !== null) ? '연간 생활비(연금↓)' : '연간 생활비';
      }
      const available = monthlyBalances.length - 1;
      for (let year = 1; year <= maxYears; year++) {
        const months = year * 12;
        if (months > available) break;
        const { balance, totalContributed, totalSavings, interest } = getSnapshot(monthlyBalances, months, monthly, initial, contributionMonths, severance);
        const ageCell = birthDate ? `<td>만 ${calcAgeAt(birthDate, months)}세</td>` : '<td>—</td>';
        const yearlyExpense = calcYearlyLivingExpense(year, contributionMonths, livingExpense, inflationRate, pensionMonthly, pensionStartMonth);
        const expenseCell = yearlyExpense !== null
          ? `<td class="expense-cell">-${formatWon(yearlyExpense)}</td>`
          : '<td>—</td>';
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${year}년</td>${ageCell}<td>${formatWon(balance)}</td><td>${formatWon(totalContributed)}</td><td>${formatWon(totalSavings)}</td>${expenseCell}<td class="interest-cell">+${formatWon(interest)}</td>`;
        tableBody.appendChild(tr);
      }
    }

    /* ── 차트 ── */
    function getChartStepEok(maxEok) { return Math.max(1, Math.ceil(maxEok / 10)); }

    function drawChart(monthlyBalances, refPoints = []) {
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      const W = rect.width, H = rect.height;
      const LABEL_LINE_H = 14;
      const MIN_X_GAP = 36;
      const totalYears = Math.floor((monthlyBalances.length - 1) / 12);

      // 가까운 라벨은 세로로 엇갈려 표시하기 위해 레벨 할당
      const sorted = [...refPoints].sort((a, b) => a.month - b.month);
      const placed = [];
      const levels = [];
      sorted.forEach(pt => {
        const xFrac = pt.month / (totalYears * 12);
        let level = 0;
        for (const p of placed) {
          if (Math.abs(p.xFrac - xFrac) * W < MIN_X_GAP && p.level >= level) level = p.level + 1;
        }
        placed.push({ xFrac, level });
        levels.push(level);
      });
      const maxLevel = levels.length > 0 ? Math.max(...levels) : 0;

      const pad = { top: 16 + maxLevel * LABEL_LINE_H, right: 16, bottom: 36, left: 52 };
      const plotW = W - pad.left - pad.right;
      const plotH = H - pad.top - pad.bottom;

      const data = [];
      for (let y = 0; y <= totalYears; y++) data.push(monthlyBalances[y * 12] ?? 0);

      const maxEok = Math.max(Math.ceil(Math.max(...data, 0) / EOK), 1);
      const stepEok = getChartStepEok(maxEok);
      const axisMaxEok = Math.ceil(maxEok / stepEok) * stepEok;
      const maxVal = axisMaxEok * EOK;
      const xScale = (yr) => pad.left + (yr / totalYears) * plotW;
      const yScale = (val) => pad.top + plotH - (val / maxVal) * plotH;

      ctx.clearRect(0, 0, W, H);

      ctx.strokeStyle = '#e2e5ea'; ctx.lineWidth = 1;
      for (let eok = 0; eok <= axisMaxEok; eok += stepEok) {
        const y = yScale(eok * EOK);
        ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left + plotW, y); ctx.stroke();
        ctx.fillStyle = '#5c6370'; ctx.font = '11px sans-serif';
        ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
        ctx.fillText(eok + '억', pad.left - 8, y);
      }

      ctx.fillStyle = '#5c6370'; ctx.font = '11px sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'top';
      const xLabelStep = totalYears > 50 ? 10 : totalYears > 25 ? 5 : totalYears > 10 ? 2 : 1;
      for (let y = 0; y <= totalYears; y++) {
        if (y % xLabelStep !== 0) continue;
        ctx.fillText(y + '년', xScale(y), pad.top + plotH + 8);
      }

      sorted.forEach(({ month, label, color }, i) => {
        const x = xScale(month / 12);
        ctx.strokeStyle = color; ctx.lineWidth = 1; ctx.setLineDash([4, 4]);
        ctx.beginPath(); ctx.moveTo(x, pad.top); ctx.lineTo(x, pad.top + plotH); ctx.stroke();
        ctx.setLineDash([]);
        const labelY = pad.top - 2 - levels[i] * LABEL_LINE_H;
        ctx.fillStyle = color; ctx.font = '10px sans-serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
        ctx.fillText(label, x, labelY);
      });

      ctx.beginPath(); ctx.moveTo(xScale(0), yScale(data[0]));
      for (let y = 1; y <= totalYears; y++) ctx.lineTo(xScale(y), yScale(data[y]));
      ctx.lineTo(xScale(totalYears), yScale(0)); ctx.lineTo(xScale(0), yScale(0));
      ctx.closePath(); ctx.fillStyle = 'rgba(37,99,235,0.08)'; ctx.fill();

      ctx.beginPath(); ctx.moveTo(xScale(0), yScale(data[0]));
      for (let y = 1; y <= totalYears; y++) ctx.lineTo(xScale(y), yScale(data[y]));
      ctx.strokeStyle = '#2563eb'; ctx.lineWidth = 2; ctx.stroke();

      const lx = xScale(totalYears), ly = yScale(data[totalYears]);
      ctx.beginPath(); ctx.arc(lx, ly, 4, 0, Math.PI * 2);
      ctx.fillStyle = '#2563eb'; ctx.fill();
    }

    /* ── 차트 범위 토글 ── */
    const chartTab20   = document.getElementById('chart-tab-20');
    const chartTab40   = document.getElementById('chart-tab-40');
    const chartTabLife = document.getElementById('chart-tab-life');
    const chartPanelTitle = document.getElementById('chart-panel-title');
    const chartCaption    = document.getElementById('chart-caption');

    function getChartYears(simYears) {
      if (chartViewMode === '40')   return Math.min(40, simYears);
      if (chartViewMode === 'life') return simYears;
      return Math.min(20, simYears);
    }

    function updateChartLabel(chartYears) {
      const label = chartViewMode === 'life' ? '수명까지 (' + chartYears + '년)' : chartYears + '년';
      chartPanelTitle.textContent = '자산 성장 그래프 (' + label + ')';
      const note = chartViewMode === 'life'
        ? '해당 기간 이내 시점만 표시'
        : chartYears + '년 이내 시점만 표시';
      chartCaption.innerHTML = 'X축: 1년 단위 · Y축: 총자산 규모별 억 단위 · 점선: <span style="color:#b45309">저축종료</span> · <span style="color:#2563eb">FIRE 달성</span> · <span style="color:#dc2626">자산소진</span> — ' + note;
    }

    function redrawChartForMode() {
      const chartYears  = getChartYears(lastSimYears);
      const chartMonths = chartYears * 12;
      const short = lastLongBalances.slice(0, Math.min(chartMonths, lastLongBalances.length - 1) + 1);
      const pts = [];
      if (lastContributionMonths > 0 && lastContributionMonths <= chartMonths)
        pts.push({ month: lastContributionMonths, label: '저축종료', color: '#b45309' });
      if (lastFireMonth !== null && lastFireMonth > 0 && lastFireMonth <= chartMonths)
        pts.push({ month: lastFireMonth, label: 'FIRE', color: '#2563eb' });
      if (lastDepletionMonth !== null && lastDepletionMonth <= chartMonths)
        pts.push({ month: lastDepletionMonth, label: '소진', color: '#dc2626' });
      lastRefPoints = pts;
      updateChartLabel(chartYears);
      drawChart(short, pts);
    }

    function setChartViewMode(mode) {
      chartViewMode = mode;
      chartTab20.classList.toggle('active',   mode === '20');
      chartTab40.classList.toggle('active',   mode === '40');
      chartTabLife.classList.toggle('active', mode === 'life');
      redrawChartForMode();
    }

    /* ── 재계산 ── */
    function recalculate() {
      const notices = [];
      const monthlyManwonParsed      = parseInput(monthlyInput,       DEFAULTS.monthlyManwon);
      const rateParsed               = parseInput(rateInput,           DEFAULTS.rate);
      const initialManwonParsed      = parseInput(initialInput,        DEFAULTS.initialManwon);
      const severanceManwonParsed    = parseInput(severanceInput,      DEFAULTS.severanceManwon);
      const livingExpenseManwonParsed= parseInput(livingExpenseInput,  DEFAULTS.livingExpenseManwon);
      const inflationRateParsed      = parseInput(inflationRateInput,  DEFAULTS.inflationRate);

      if (monthlyManwonParsed.corrected)       { monthlyInput.value = monthlyManwonParsed.value;             notices.push('월 저축액을 기본값으로 조정했습니다.'); }
      if (rateParsed.corrected)                { rateInput.value = rateParsed.value;                          notices.push('연 수익률을 기본값으로 조정했습니다.'); }
      if (initialManwonParsed.corrected)       { initialInput.value = initialManwonParsed.value;              notices.push('초기 자산을 기본값으로 조정했습니다.'); }
      if (severanceManwonParsed.corrected)     { severanceInput.value = severanceManwonParsed.value;          notices.push('퇴직금을 기본값으로 조정했습니다.'); }
      if (livingExpenseManwonParsed.corrected) { livingExpenseInput.value = livingExpenseManwonParsed.value;  notices.push('퇴직 후 생활비를 기본값으로 조정했습니다.'); }
      if (inflationRateParsed.corrected)       { inflationRateInput.value = inflationRateParsed.value;        notices.push('물가상승률을 기본값으로 조정했습니다.'); }

      let contributionMonths;
      if (contribMode === 'date') {
        contributionMonths = calcContribMonthsFromDate();
        updateContribHint();
      } else {
        const cyParsed = parseInput(contributionYearsInput, DEFAULTS.contributionYears);
        let cy = Math.floor(cyParsed.value);
        if (cyParsed.corrected) { contributionYearsInput.value = cyParsed.value; notices.push('저축 기간을 기본값으로 조정했습니다.'); }
        if (cy > MAX_YEARS)     { cy = MAX_YEARS; contributionYearsInput.value = MAX_YEARS; notices.push('저축 기간은 최대 20년까지 설정할 수 있습니다.'); }
        contributionMonths = cy * 12;
        contribHintEl.textContent = '';
      }

      const monthly       = monthlyManwonParsed.value * MANWON;
      const rate          = rateParsed.value;
      const initial       = initialManwonParsed.value * MANWON;
      const severance     = severanceManwonParsed.value * MANWON;
      const livingExpense = livingExpenseManwonParsed.value * MANWON;
      const inflationRate = inflationRateParsed.value;
      const lifeExpectancy= Math.max(0, Math.floor(Number(lifeExpectancyInput.value) || DEFAULTS.lifeExpectancy));
      const birthDate     = parseBirthDate();
      const simYears      = calcSimYears(birthDate, lifeExpectancy);
      const simMonths     = simYears * 12;
      const pensionMonthly    = Math.max(0, Number(pensionMonthlyInput.value) || 0) * MANWON;
      const pensionAge        = Math.max(0, Math.floor(Number(pensionAgeInput.value) || DEFAULTS.pensionAge));
      const pensionStartMonth = calcPensionStartMonth(birthDate, pensionAge);

      const { monthlyBalances: longBalances } = simulate(monthly, rate, initial, simMonths, contributionMonths, severance, livingExpense, inflationRate, pensionMonthly, pensionStartMonth);

      lastLongBalances     = longBalances;
      lastSimYears         = simYears;
      lastContributionMonths = contributionMonths;

      const chartYears  = getChartYears(simYears);
      const chartMonths = chartYears * 12;
      const shortBalances = longBalances.slice(0, Math.min(chartMonths, simMonths) + 1);

      const { fireMonth, depletionMonth } = renderResults(monthly, rate, initial, contributionMonths, severance, livingExpense, longBalances, notices, birthDate, simYears);
      renderTable(monthly, rate, initial, contributionMonths, severance, longBalances, birthDate, lifeExpectancy, livingExpense, inflationRate, pensionMonthly, pensionStartMonth);

      lastFireMonth      = fireMonth;
      lastDepletionMonth = depletionMonth;

      lastRefPoints = [];
      if (contributionMonths > 0 && contributionMonths <= chartMonths)
        lastRefPoints.push({ month: contributionMonths, label: '저축종료', color: '#b45309' });
      if (fireMonth !== null && fireMonth > 0 && fireMonth <= chartMonths)
        lastRefPoints.push({ month: fireMonth, label: 'FIRE', color: '#2563eb' });
      if (depletionMonth !== null && depletionMonth <= chartMonths)
        lastRefPoints.push({ month: depletionMonth, label: '소진', color: '#dc2626' });

      updateChartLabel(chartYears);
      drawChart(shortBalances, lastRefPoints);
      updateInitialHint();
      updateSeveranceHint();
      updateBirthHint();
      updatePensionHints();
    }

    /* ── 이벤트 ── */
    [monthlyInput, rateInput, initialInput, contributionYearsInput, severanceInput, livingExpenseInput, inflationRateInput, lifeExpectancyInput, pensionMonthlyInput, pensionAgeInput].forEach((el) => {
      el.addEventListener('input', () => { if (/^0\d/.test(el.value)) el.value = String(Number(el.value)); recalculate(); });
    });
    birthDateInput.addEventListener('input', handleBirthDateInput);
    [retireYearInput, retireMonthInput].forEach(el => el.addEventListener('input', recalculate));
    tabYearsBtn.addEventListener('click', () => { setContribMode('years'); recalculate(); });
    tabDateBtn.addEventListener('click',  () => { setContribMode('date');  recalculate(); });
    saveDefaultsBtn.addEventListener('click', saveDefaults);
    chartTab20.addEventListener('click',   () => setChartViewMode('20'));
    chartTab40.addEventListener('click',   () => setChartViewMode('40'));
    chartTabLife.addEventListener('click', () => setChartViewMode('life'));

    window.addEventListener('resize', () => {
      redrawChartForMode();
    });

    applyBuiltInDefaults();
    loadDefaults();
    loadFromURL();
    recalculate();
  </script>
</body>
</html>
